name: Test Code.json Action
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-code-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SCC
        run: |
          wget https://github.com/boyter/scc/releases/download/v3.4.0/scc-3.4.0-linux-amd64.zip
          unzip scc-3.4.0-linux-amd64.zip
          sudo mv scc /usr/local/bin/
          sudo chmod +x /usr/local/bin/scc
          scc --version
      
      - name: Update code.json
        uses: ./ 
        with:
          GITHUB_TOKEN: ${{ secrets.TESTING }}