name: Test Code.json Action
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-code-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scc
        run: |
          curl -L https://github.com/boyter/scc/releases/download/v3.1.0/scc-3.1.0-x86_64-unknown-linux-musl.zip -o scc.zip
          unzip scc.zip
          chmod +x scc
          sudo mv scc /usr/local/bin/
      
      - name: Update code.json
        uses: ./ 
        with:
          github-token: ${{ secrets.TESTING }}